# Blocks all IPs → 403 (used to protect /api/swagger)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: deny-all
  namespace: default
spec:
  ipAllowList:
    sourceRange:
      - "255.255.255.255/32"   # matches no real IP → 403 for everyone
---
# Higher-priority route that blocks /api/swagger before the main /api rule matches
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-swagger-block
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "10"
    traefik.ingress.kubernetes.io/router.middlewares: default-deny-all@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: int20h.chivtar.dev
      http:
        paths:
          - path: /api/swagger
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: default
  annotations:
    # Uncomment if you want TLS via cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  # Uncomment and set your real domain:
  # tls:
  #   - hosts:
  #       - your-domain.com
  #     secretName: app-tls
  rules:
    - host: int20h.chivtar.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
