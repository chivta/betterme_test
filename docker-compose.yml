services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: taxcalc
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d taxcalc"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://app:secret@db:5432/taxcalc?sslmode=disable
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: http://localhost:8080/api/auth/google/callback
      FRONTEND_URL: http://localhost:3000
      PORT: "8080"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
